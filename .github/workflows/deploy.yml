name: Deploy to GitHub Pages

on:
  push:
    branches: [gui]   # deploy on every push to gui branch

permissions:
  contents: write     # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
        env:
          # Set these in: GitHub repo → Settings → Secrets → Actions
          # VITE_API_URL  = https://your-bridge-ngrok-url.ngrok-free.app
          # VITE_WS_URL   = wss://your-bridge-ngrok-url.ngrok-free.app/ws
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL:  ${{ secrets.VITE_WS_URL }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./client/dist
          # GitHub Pages SPA needs a 404 fallback to index.html
          # (HashRouter handles routing client-side, so 404 is never hit in practice)
